
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>向导工作系统 v1.0</title>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-main: #333;
            --accent: #000000;
        }
        body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg-color); display: flex; justify: center; margin: 0; padding: 20px; color: var(--text-main); }
        .mobile-container { width: 375px; background: white; min-height: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; overflow-y: auto; padding-bottom: 50px;}
        
        /* Header */
        .header { background: #333; color: white; padding: 15px; text-align: center; font-size: 14px; display: flex; justify-content: space-between; align-items: center;}
        
        /* Stats Area */
        .stats-panel { padding: 20px; border-bottom: 1px solid #eee; }
        .stat-line { margin: 10px 0; font-size: 13px; }
        .progress-bar { height: 4px; background: #eee; width: 100%; margin-top: 5px; border-radius: 2px; overflow: hidden;}
        .progress-inner { height: 100%; background: #333; transition: width 0.3s; }

        /* Sentry List */
        .section-title { padding: 10px 20px; background: #fafafa; font-size: 12px; font-weight: bold; }
        .sentry-card { padding: 15px 20px; border-bottom: 1px solid #eee; position: relative; }
        .sentry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
        .sentry-name { font-size: 16px; font-weight: bold; }
        .sentry-tag { font-size: 11px; color: #888; border: 1px solid #ddd; padding: 2px 5px; border-radius: 3px; }
        .sentry-detail { font-size: 12px; color: #666; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        
        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 8px; border: 1px solid #ddd; background: white; font-size: 12px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #f0f0f0; }
        .btn-primary { background: #000; color: white; border: none; }
        .btn-shop { width: 100%; margin-top: 10px; padding: 12px; background: #000; color: white; }

        /* Modal */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 80%; padding: 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="mobile-container">
    <div class="header">
        <span>🔍 向导工作系统 v5.3</span>
        <span onclick="location.reload()" style="cursor:pointer">🔄</span>
    </div>

    <div class="stats-panel">
        <h3 style="text-align: center; font-weight: normal;">塔·向导工作系统</h3>
        <p style="text-align: center; font-size: 12px; color: #888;">塔历596年11月8日</p>
        <div class="stat-line">
            <span>精神力: <span id="mental-val">42</span>/100</span>
            <div class="progress-bar"><div id="mental-bar" class="progress-inner" style="width: 42%"></div></div>
        </div>
        <div class="stat-line">
            <span>精力值: <span id="energy-val">97</span>/100</span>
            <div class="progress-bar"><div id="energy-bar" class="progress-inner" style="width: 97%"></div></div>
        </div>
        <div class="stat-line">
            <span>信用点: <span id="credit-val">30</span></span>
        </div>
        <button class="btn-shop" onclick="toggleShop(true)">前往补给商店</button>
    </div>

    <div class="section-title">预约列表 (当日剩余名额: <span id="slots">3</span>)</div>
    <div id="sentry-list">
        </div>
</div>

<div id="shop-modal" class="modal">
    <div class="modal-content">
        <h4>补给商店</h4>
        <div style="margin-bottom: 15px; font-size: 13px;">
            <p>小瓶精力剂 (恢复20) - 15信用点 <button onclick="buy(20, 15)">购买</button></p>
            <p>小瓶精神药 (恢复20) - 20信用点 <button onclick="buyMental(20, 20)">购买</button></p>
        </div>
        <button class="btn-primary" onclick="toggleShop(false)">关闭</button>
    </div>
</div>

<script>
    // 初始数据
    let userData = {
        mental: 42,
        energy: 97,
        credit: 30,
        slots: 3
    };

    const sentries = [
        { name: "印影苏", rank: "D级", gender: "女", animal: "苏门答腊虎", match: 77, stability: 57, mood: "亲近" },
        { name: "维奥莱特", rank: "D级", gender: "女", animal: "梅花鹿", match: 45, stability: 28, mood: "敏感" },
        { name: "卡西米尔", rank: "C级", gender: "男", animal: "食蚁兽", match: 54, stability: 58, mood: "冷静" }
    ];

    function updateUI() {
        document.getElementById('mental-val').innerText = userData.mental;
        document.getElementById('mental-bar').style.width = userData.mental + '%';
        document.getElementById('energy-val').innerText = userData.energy;
        document.getElementById('energy-bar').style.width = userData.energy + '%';
        document.getElementById('credit-val').innerText = userData.credit;
        document.getElementById('slots').innerText = userData.slots;
    }

    function renderSentries() {
        const container = document.getElementById('sentry-list');
        container.innerHTML = sentries.map((s, idx) => `
            <div class="sentry-card">
                <div class="sentry-header">
                    <span class="sentry-name">${s.name} <span style="font-size:10px; font-weight:normal;">· ${s.rank}</span></span>
                    <span class="sentry-tag">${s.mood}</span>
                </div>
                <div class="sentry-detail">
                    <span>性别：${s.gender}</span>
                    <span>匹配度：${s.match}%</span>
                    <span>精神体：${s.animal}</span>
                    <span>稳定性：${s.stability}%</span>
                </div>
                <div class="btn-group">
                    <button onclick="soothe(${idx})">进行安抚</button>
                    <button style="color: #999;">拒绝预约</button>
                </div>
            </div>
        `).join('');
    }

    function soothe(idx) {
        if (userData.energy < 20) {
            alert("精力不足！请休息或前往商店。");
            return;
        }
        if (userData.slots <= 0) {
            alert("今日安抚名额已满。");
            return;
        }

        // 模拟逻辑：消耗精力，获得信用点和经验，提升哨兵稳定性
        userData.energy -= 20;
        userData.mental -= 5;
        userData.credit += 10;
        userData.slots -= 1;
        sentries[idx].stability = Math.min(100, sentries[idx].stability + 15);
        
        alert(`对 ${sentries[idx].name} 进行了梳理。精神消耗5，获得10信用点。`);
        updateUI();
        renderSentries();
    }

    function toggleShop(show) {
        document.getElementById('shop-modal').style.display = show ? 'flex' : 'none';
    }

    function buy(e, cost) {
        if (userData.credit >= cost) {
            userData.credit -= cost;
            userData.energy = Math.min(100, userData.energy + e);
            updateUI();
        } else { alert("信用点不足"); }
    }

    function buyMental(m, cost) {
        if (userData.credit >= cost) {
            userData.credit -= cost;
            userData.mental = Math.min(100, userData.mental + m);
            updateUI();
        } else { alert("信用点不足"); }
    }

    // 初始化执行
    renderSentries();
    updateUI();
</script>

</body>
</html>
